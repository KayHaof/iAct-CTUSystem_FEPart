<div class="flex flex-col sm:flex-row items-center justify-between gap-4 border-t border-slate-200/60 bg-white px-4 py-4 sm:px-6 rounded-b-2xl">
  <div class="flex items-center justify-between w-full sm:w-auto gap-4">
    <div class="flex items-center gap-2">
      <label for="pageSize" class="text-sm text-slate-500 font-medium whitespace-nowrap">Hiển thị:</label>
      <div class="relative">
        <button
          type="button"
          (click)="isDropdownOpen.set(!isDropdownOpen())"
          (blur)="onBlur()"
          class="flex items-center justify-between w-[72px] rounded-lg border border-slate-200 bg-white py-1.5 pl-3 pr-2 text-sm font-bold text-slate-700 shadow-sm hover:bg-slate-50 focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 transition-all cursor-pointer"
        >
          {{ pageSize() }}
          <i class="bi bi-chevron-down text-[10px] text-slate-400 font-bold"></i>
        </button>

        @if (isDropdownOpen()) {
          <div class="absolute bottom-full left-0 mb-1.5 w-[72px] origin-bottom-left rounded-xl bg-white shadow-lg ring-1 ring-slate-200 focus:outline-none z-50 overflow-hidden py-1 border border-slate-100">
            @for (size of pageSizeOptions(); track size) {
              <button
                type="button"
                (click)="selectPageSize(size)"
                class="block w-full px-3 py-2 text-center text-sm font-bold transition-colors cursor-pointer"
                [class.bg-indigo-50]="size === pageSize()"
                [class.text-indigo-600]="size === pageSize()"
                [class.text-slate-600]="size !== pageSize()"
                [class.hover:bg-slate-50]="size !== pageSize()"
              >
                {{ size }}
              </button>
            }
          </div>
        }
      </div>
    </div>

    <p class="text-sm text-slate-500 font-medium whitespace-nowrap hidden sm:block">
      <span class="text-slate-300 mr-2">|</span>
      Đang xem <span class="font-bold text-slate-800">{{ startItem() }}</span> đến <span class="font-bold text-slate-800">{{ endItem() }}</span>
      trong <span class="font-bold text-slate-800">{{ totalItems() }}</span>
    </p>
    <p class="text-xs text-slate-500 font-medium whitespace-nowrap sm:hidden">
      {{ startItem() }} - {{ endItem() }} / <span class="font-bold text-slate-800">{{ totalItems() }}</span>
    </p>
  </div>

  <div class="w-full sm:w-auto flex justify-center overflow-x-auto max-w-full pb-1 sm:pb-0 custom-scrollbar-hidden">
    <nav class="isolate inline-flex -space-x-px rounded-xl shadow-sm bg-slate-50 p-1 border border-slate-100 min-w-max" aria-label="Pagination">
      <button
        (click)="prevPage()"
        [disabled]="currentPage() === 1"
        class="relative inline-flex items-center rounded-lg px-2.5 py-1 text-slate-400 hover:bg-white hover:text-indigo-600 hover:shadow-sm focus:z-20 disabled:opacity-30 disabled:cursor-not-allowed transition-all"
        title="Trang trước"
      >
        <span class="sr-only">Previous</span>
        <i class="bi bi-chevron-left text-sm font-bold"></i>
      </button>

      <!-- Các số trang -->
      @for (page of pages(); track $index) {
        @if (page === '...') {
          <span class="relative inline-flex items-center px-3 py-1 text-sm font-bold text-slate-400">...</span>
        } @else {
          <button
            (click)="onPageClick(page)"
            [class.bg-indigo-600]="page === currentPage()"
            [class.text-white]="page === currentPage()"
            [class.shadow-md]="page === currentPage()"
            [class.text-slate-600]="page !== currentPage()"
            [class.hover:bg-white]="page !== currentPage()"
            [class.hover:text-indigo-600]="page !== currentPage()"
            class="relative inline-flex items-center rounded-lg px-3.5 py-1 text-sm font-bold transition-all duration-200 cursor-pointer"
          >
            {{ page }}
          </button>
        }
      }
      <button
        (click)="nextPage()"
        [disabled]="currentPage() === totalPages() || totalPages() === 0"
        class="relative inline-flex items-center rounded-lg px-2.5 py-1 text-slate-400 hover:bg-white hover:text-indigo-600 hover:shadow-sm focus:z-20 disabled:opacity-30 disabled:cursor-not-allowed transition-all"
        title="Trang sau"
      >
        <span class="sr-only">Next</span>
        <i class="bi bi-chevron-right text-sm font-bold"></i>
      </button>

    </nav>
  </div>

</div>
