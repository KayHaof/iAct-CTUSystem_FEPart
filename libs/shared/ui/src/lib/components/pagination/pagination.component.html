<div
  class="flex items-center justify-between border-t border-gray-100 bg-white px-4 py-3 sm:px-6 mt-4 rounded-b-2xl"
>
  <div class="flex flex-1 justify-between sm:hidden">
    <button
      (click)="prevPage()"
      [disabled]="currentPage() === 1"
      class="relative inline-flex items-center rounded-md border border-gray-300 bg-white px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 disabled:opacity-50"
    >
      Previous
    </button>
    <button
      (click)="nextPage()"
      [disabled]="currentPage() === totalPages()"
      class="relative ml-3 inline-flex items-center rounded-md border border-gray-300 bg-white px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 disabled:opacity-50"
    >
      Next
    </button>
  </div>

  <div class="hidden sm:flex sm:flex-1 sm:items-center sm:justify-between">
    <div>
      <p class="text-sm text-gray-500">
        Hiển thị
        <span class="font-semibold text-gray-800">{{ (currentPage() - 1) * pageSize() + 1 }}</span>
        đến
        <span class="font-semibold text-gray-800">{{
          mathMin(currentPage() * pageSize(), totalItems())
        }}</span>
        trong tổng số <span class="font-semibold text-gray-800">{{ totalItems() }}</span> kết quả
      </p>
    </div>

    <div>
      <nav
        class="isolate inline-flex -space-x-px rounded-xl shadow-sm bg-gray-50 p-1"
        aria-label="Pagination"
      >
        <button
          (click)="prevPage()"
          [disabled]="currentPage() === 1"
          class="relative inline-flex items-center rounded-lg px-2 py-2 text-gray-400 hover:bg-white hover:text-blue-600 focus:z-20 disabled:opacity-30 transition-all"
        >
          <span class="sr-only">Previous</span>
          <svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
            <path
              fill-rule="evenodd"
              d="M12.79 5.23a.75.75 0 01-.02 1.06L8.832 10l3.938 3.71a.75.75 0 11-1.04 1.08l-4.5-4.25a.75.75 0 010-1.08l4.5-4.25a.75.75 0 011.06.02z"
              clip-rule="evenodd"
            />
          </svg>
        </button>

        @for (page of pages(); track $index) {
          @if (page === '...') {
            <span
              class="relative inline-flex items-center px-4 py-2 text-sm font-semibold text-gray-400"
              >...</span
            >
          } @else {
            <button
              (click)="onPageClick(page)"
              [class.bg-blue-600]="page === currentPage()"
              [class.text-white]="page === currentPage()"
              [class.shadow-md]="page === currentPage()"
              [class.text-gray-700]="page !== currentPage()"
              [class.hover:bg-white]="page !== currentPage()"
              class="relative inline-flex items-center rounded-lg px-4 py-2 text-sm font-bold transition-all duration-200"
            >
              {{ page }}
            </button>
          }
        }

        <button
          (click)="nextPage()"
          [disabled]="currentPage() === totalPages()"
          class="relative inline-flex items-center rounded-lg px-2 py-2 text-gray-400 hover:bg-white hover:text-blue-600 focus:z-20 disabled:opacity-30 transition-all"
        >
          <span class="sr-only">Next</span>
          <svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
            <path
              fill-rule="evenodd"
              d="M7.21 14.77a.75.75 0 01.02-1.06L11.168 10 7.23 6.29a.75.75 0 111.04-1.08l4.5 4.25a.75.75 0 010 1.08l-4.5 4.25a.75.75 0 01-1.06-.02z"
              clip-rule="evenodd"
            />
          </svg>
        </button>
      </nav>
    </div>
  </div>
</div>
