<div class="flex items-center justify-between border-t border-slate-200/60 bg-white px-4 py-4 sm:px-6 rounded-b-2xl">
  <div class="flex flex-1 justify-between sm:hidden">
    <button
      (click)="prevPage()"
      [disabled]="currentPage() === 1"
      class="relative inline-flex items-center rounded-xl border border-slate-200 bg-white px-4 py-2 text-sm font-bold text-slate-700 hover:bg-slate-50 disabled:opacity-50 disabled:cursor-not-allowed shadow-sm"
    >
      Trước
    </button>
    <button
      (click)="nextPage()"
      [disabled]="currentPage() === totalPages() || totalPages() === 0"
      class="relative ml-3 inline-flex items-center rounded-xl border border-slate-200 bg-white px-4 py-2 text-sm font-bold text-slate-700 hover:bg-slate-50 disabled:opacity-50 disabled:cursor-not-allowed shadow-sm"
    >
      Sau
    </button>
  </div>
  <div class="hidden sm:flex sm:flex-1 sm:items-center sm:justify-between sm:flex-wrap sm:gap-4">
    <div class="flex items-center gap-4">
      <div class="flex items-center gap-2">
        <label for="pageSize" class="text-sm text-slate-500 font-medium whitespace-nowrap">Hiển thị:</label>
        <div class="relative">
          <button
            type="button"
            (click)="isDropdownOpen.set(!isDropdownOpen())"
            (blur)="onBlur()"
            class="flex items-center justify-between w-[72px] rounded-lg border border-slate-200 bg-white py-1.5 pl-3 pr-2 text-sm font-bold text-slate-700 shadow-sm hover:bg-slate-50 focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 transition-all cursor-pointer"
          >
            {{ pageSize() }}
            <svg class="h-4 w-4 text-slate-400" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z" clip-rule="evenodd" />
            </svg>
          </button>
          @if (isDropdownOpen()) {
            <div class="absolute bottom-full left-0 mb-1.5 w-[72px] origin-bottom-left rounded-xl bg-white shadow-lg ring-1 ring-slate-200 focus:outline-none z-50 overflow-hidden py-1 border border-slate-100">
              @for (size of pageSizeOptions(); track size) {
                <button
                  type="button"
                  (click)="selectPageSize(size)"
                  class="block w-full px-3 py-2 text-center text-sm font-bold transition-colors cursor-pointer"
                  [class.bg-indigo-50]="size === pageSize()"
                  [class.text-indigo-600]="size === pageSize()"
                  [class.text-slate-600]="size !== pageSize()"
                  [class.hover:bg-slate-50]="size !== pageSize()"
                >
                  {{ size }}
                </button>
              }
            </div>
          }
        </div>
      </div>
      <p class="text-sm text-slate-500 font-medium hidden lg:block whitespace-nowrap">
        <span class="text-slate-300 mr-2">|</span>
        Đang xem
        <span class="font-bold text-slate-800">{{ startItem() }}</span>
        đến
        <span class="font-bold text-slate-800">{{ endItem() }}</span>
        trong
        <span class="font-bold text-slate-800">{{ totalItems() }}</span>
        kết quả
      </p>
    </div>
    <div class="overflow-x-auto max-w-full">
      <nav class="isolate inline-flex -space-x-px rounded-xl shadow-sm bg-slate-50 p-1 border border-slate-100 min-w-max" aria-label="Pagination">

        <button
          (click)="prevPage()"
          [disabled]="currentPage() === 1"
          class="relative inline-flex items-center rounded-lg px-2 py-2 text-slate-400 hover:bg-white hover:text-indigo-600 focus:z-20 disabled:opacity-30 disabled:cursor-not-allowed transition-all"
        >
          <span class="sr-only">Previous</span>
          <svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M12.79 5.23a.75.75 0 01-.02 1.06L8.832 10l3.938 3.71a.75.75 0 11-1.04 1.08l-4.5-4.25a.75.75 0 010-1.08l4.5-4.25a.75.75 0 011.06.02z" clip-rule="evenodd" />
          </svg>
        </button>

        @for (page of pages(); track $index) {
          @if (page === '...') {
            <span class="relative inline-flex items-center px-3 py-2 text-sm font-bold text-slate-400">...</span>
          } @else {
            <button
              (click)="onPageClick(page)"
              [class.bg-indigo-600]="page === currentPage()"
              [class.text-white]="page === currentPage()"
              [class.shadow-md]="page === currentPage()"
              [class.text-slate-600]="page !== currentPage()"
              [class.hover:bg-white]="page !== currentPage()"
              [class.hover:text-indigo-600]="page !== currentPage()"
              class="relative inline-flex items-center rounded-lg px-3.5 py-2 text-sm font-bold transition-all duration-200 cursor-pointer"
            >
              {{ page }}
            </button>
          }
        }

        <button
          (click)="nextPage()"
          [disabled]="currentPage() === totalPages() || totalPages() === 0"
          class="relative inline-flex items-center rounded-lg px-2 py-2 text-slate-400 hover:bg-white hover:text-indigo-600 focus:z-20 disabled:opacity-30 disabled:cursor-not-allowed transition-all"
        >
          <span class="sr-only">Next</span>
          <svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M7.21 14.77a.75.75 0 01.02-1.06L11.168 10 7.23 6.29a.75.75 0 111.04-1.08l4.5 4.25a.75.75 0 010 1.08l-4.5 4.25a.75.75 0 01-1.06-.02z" clip-rule="evenodd" />
          </svg>
        </button>

      </nav>
    </div>
  </div>
</div>
