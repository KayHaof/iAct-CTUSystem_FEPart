<div class="pagination-wrapper" [class.dark]="theme() === 'dark'">
  <div class="pagination-info">
    <div class="info-row">
      <p class="info-text">
        <span class="hidden sm:inline">Đang xem </span>
        <span class="info-highlight">{{ startItem() }}</span>
        <span class="info-separator">-</span>
        <span class="info-highlight">{{ endItem() }}</span>
        <span class="info-separator"> / </span>
        <span class="info-highlight">{{ totalItems() }}</span>
        <span class="hidden sm:inline"> mục</span>
      </p>

      <div class="page-size-dropdown">
        <button
          type="button"
          class="page-size-trigger"
          aria-haspopup="listbox"
          [attr.aria-expanded]="isDropdownOpen()"
          (click)="isDropdownOpen.set(!isDropdownOpen())"
          (blur)="onBlur()"
        >
          {{ pageSize() }}
          <i class="bi bi-chevron-down dropdown-icon"></i>
        </button>

        @if (isDropdownOpen()) {
          <div
            class="page-size-menu"
            role="listbox"
          >
            @for (size of pageSizeOptions(); track size) {
              <button
                type="button"
                class="page-size-option"
                [class.active]="size === pageSize()"
                (click)="selectPageSize(size)"
              >
                {{ size }} mục
              </button>
            }
          </div>
        }
      </div>
    </div>
  </div>

  <div class="pagination-nav">
    <nav class="nav-container" aria-label="Phân trang">
      <button
        type="button"
        class="nav-button nav-prev"
        title="Trang trước"
        [disabled]="currentPage() === 1"
        (click)="prevPage()"
      >
        <span class="sr-only">Trang trước</span>
        <i class="bi bi-chevron-left"></i>
      </button>

      @for (page of pages(); track $index) {
        @if (page === '...') {
          <span class="nav-ellipsis">...</span>
        } @else {
          <button
            type="button"
            class="nav-page"
            [class.active]="page === currentPage()"
            [attr.aria-current]="page === currentPage() ? 'page' : null"
            (click)="onPageClick(page)"
          >
            {{ page }}
          </button>
        }
      }

      <button
        type="button"
        class="nav-button nav-next"
        title="Trang sau"
        [disabled]="currentPage() === totalPages() || totalPages() === 0"
        (click)="nextPage()"
      >
        <span class="sr-only">Trang sau</span>
        <i class="bi bi-chevron-right"></i>
      </button>
    </nav>
  </div>
</div>
