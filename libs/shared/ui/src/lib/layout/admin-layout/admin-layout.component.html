<div class="layout-wrapper" [class.mobile-menu-open]="isMobileMenuOpen()">
  <!-- Mobile Backdrop Overlay -->
  @if (isMobileMenuOpen()) {
    <div
      class="sidebar-backdrop"
      (click)="closeMobileMenu()"
      (keydown.escape)="closeMobileMenu()"
      tabindex="-1"
      aria-hidden="true"
    ></div>
    <button
      class="mobile-close-btn"
      type="button"
      (click)="closeMobileMenu()"
      aria-label="Dong menu"
    >
      <i class="bi bi-x-lg"></i>
    </button>
  }

  <lib-sidebar [menuItems]="adminMenus()" theme="light" class="sidebar-area"></lib-sidebar>

  <div class="content-area">
    <lib-header theme="light" class="header-area"></lib-header>

    <lib-loading-bar></lib-loading-bar>

    <main class="main-scrollable">
      <div class="page-content iact-page">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</div>
