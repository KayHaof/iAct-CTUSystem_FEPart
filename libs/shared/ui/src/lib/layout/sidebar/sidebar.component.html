@if (isOpen) {
  <div
    class="fixed inset-0 bg-black/50 z-40 md:hidden backdrop-blur-sm transition-opacity"
    (click)="close()"
    (keydown.enter)="close()"
    tabindex="0"
  ></div>
}

<aside
  class="sidebar-container"
  [class.theme-dark]="theme === 'dark'"
  [class.translate-x-0]="isOpen"
  [class.-translate-x-full]="!isOpen"
>
  <div class="sidebar-logo p-4">
    <span class="logo-text">iAct CTU</span>
  </div>

  <nav class="flex-grow flex flex-col gap-2 p-3">
    @for (item of menuItems; track item.label) {
      <a
        [routerLink]="item.link"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: false }"
        class="nav-item"
        (click)="close()"
      >
        <i [class]="item.icon" class="text-xl w-6 text-center"></i>
        <span class="nav-text">{{ item.label }}</span>
      </a>
    }
  </nav>

  <div class="p-3">
    <button class="logout-btn w-full text-left" (click)="logout()">
      <i class="bi bi-box-arrow-left text-xl w-6 text-center"></i>
      <span class="nav-text">Log Out</span>
    </button>
  </div>
</aside>
