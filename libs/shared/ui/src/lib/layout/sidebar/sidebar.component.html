<aside
  class="sidebar-container"
  [class.is-mobile-open]="isMobileOpen()"
  [class.is-light]="theme === 'light'"
  [class.is-dark]="theme === 'dark'"
  aria-label="Thanh điều hướng chính"
>
  <div class="sidebar-logo">
    <div class="brand-mark" aria-hidden="true"></div>
    <div class="brand-copy">
      <span class="logo-text">iAct CTU</span>
      <span class="logo-subtitle">Quản lý hoạt động</span>
    </div>
  </div>

  <nav class="sidebar-nav" aria-label="Danh mục điều hướng">
    @for (item of menuItems; track item.label) {
      <a
        [routerLink]="item.link"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: false }"
        class="nav-item"
        (click)="handleNavigation($event)"
        [title]="item.label"
      >
        <i [class]="item.icon" class="nav-icon"></i>
        <span class="nav-text">{{ item.label }}</span>
      </a>
    }
  </nav>

  <div class="sidebar-footer">
    <button class="logout-btn" type="button" (click)="logout()" title="Đăng xuất">
      <i class="bi bi-box-arrow-left nav-icon"></i>
      <span class="nav-text">Đăng xuất</span>
    </button>
  </div>
</aside>
