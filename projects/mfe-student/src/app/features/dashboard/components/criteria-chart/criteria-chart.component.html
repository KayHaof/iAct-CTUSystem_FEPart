<div class="chart-container">
  <h3 class="chart-title">📊 Chi tiết điểm rèn luyện</h3>

  <div class="chart-body">
    @for (item of scores; track item.name) {
      <div class="score-item">
        <div class="score-header">
          <span class="label">{{ item.name }}</span>
          <span class="value">{{ item.current }}/{{ item.max }}</span>
        </div>

        <div class="progress-track">
          <div
            class="progress-fill"
            [ngClass]="item.color"
            [style.width.%]="(item.current / item.max) * 100"
          ></div>
        </div>
      </div>
    }
  </div>

  <div class="chart-footer">
    <p class="update-text">Cập nhật lần cuối: Vừa xong</p>
  </div>
</div>
