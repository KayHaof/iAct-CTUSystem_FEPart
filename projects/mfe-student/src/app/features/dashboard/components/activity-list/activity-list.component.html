<div class="list-container">
  <div class="list-header">
    <h3 class="header-title"><i class="bi bi-calendar-week me-2 text-blue-600"></i> Sắp diễn ra</h3>
    <button class="view-all-btn">Xem tất cả <i class="bi bi-arrow-right"></i></button>
  </div>

  <div class="list-body">
    @for (item of activities; track item.id) {
      <div
        class="activity-item group"
        role="button"
        tabindex="0"
        (click)="itemClick.emit(item.id)"
        (keydown.enter)="itemClick.emit(item.id)"
        (keydown.space)="itemClick.emit(item.id); $event.preventDefault()"
      >
        <div class="date-box">
          <span class="month">{{ item.date | date: 'MMM' }}</span>
          <span class="day">{{ item.date | date: 'dd' }}</span>
        </div>

        <div class="info-box">
          <h4 class="activity-title">{{ item.title }}</h4>
          <div class="meta-info">
            <span class="meta-item"><i class="bi bi-clock"></i> {{ item.time }}</span>
            <span class="divider">|</span>
            <span class="meta-item"
              ><i class="bi bi-geo-alt-fill text-red-400"></i> {{ item.location }}</span
            >
          </div>
        </div>

        <span
          class="status-badge"
          [ngClass]="{
            upcoming: item.status === 'UPCOMING',
            pending: item.status === 'PENDING',
          }"
        >
          {{ item.status === 'UPCOMING' ? 'Sắp tới' : 'Chờ duyệt' }}
        </span>
      </div>
    } @empty {
      <div class="empty-state">
        <i class="bi bi-inbox icon"></i>
        <span>Không có hoạt động nào sắp tới.</span>
      </div>
    }
  </div>
</div>
