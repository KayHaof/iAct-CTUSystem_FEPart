<div class="w-full bg-slate-50 p-4 sm:p-6">
  <div class="mx-auto max-w-3xl">
    <!-- Header -->
    <div class="iact-student-header">
      <p class="iact-student-eyebrow">Cá nhân hóa</p>
      <h1 class="iact-student-title">Cài đặt ưu tiên</h1>
      <p class="iact-student-subtitle">
        Cấu hình tiêu chí quan tâm để nhận gợi ý hoạt động phù hợp.
      </p>
    </div>

    <!-- AI Recommendation Toggle -->
    <div
      class="mb-4 rounded-2xl border border-blue-100 bg-gradient-to-r from-blue-50 to-sky-50 p-4 shadow-sm sm:mb-6 sm:p-6"
    >
      <h2 class="mb-4 text-lg font-semibold text-slate-800">Gợi ý tự động</h2>
      <label class="flex cursor-pointer items-start gap-3 sm:items-center">
        <input
          type="checkbox"
          [checked]="aiEnabled()"
          (change)="toggleAI($event)"
          class="w-5 h-5 text-blue-600 rounded focus:ring-blue-500"
        />
        <div>
          <p class="font-medium text-slate-700">Kích hoạt gợi ý AI</p>
          <p class="text-sm leading-6 text-slate-500">
            Hệ thống tự động gợi ý hoạt động phù hợp với sở thích của bạn.
          </p>
        </div>
      </label>
    </div>

    <!-- Categories Selection -->
    <div class="mb-4 rounded-2xl border border-slate-200 bg-white p-4 shadow-sm sm:mb-6 sm:p-6">
      <h2 class="mb-2 text-lg font-semibold text-slate-800">Tiêu chí quan tâm</h2>
      <p class="mb-4 text-sm leading-6 text-slate-500">
        Chọn các tiêu chí bạn muốn nhận thông báo và gợi ý.
      </p>

      <div class="grid grid-cols-1 gap-3 sm:grid-cols-2">
        @for (cat of categories(); track cat.id) {
          <label
            class="flex min-w-0 cursor-pointer items-start gap-3 rounded-xl border border-slate-200 p-3 transition hover:bg-slate-50 sm:items-center"
            [class.border-blue-400]="isSelected(cat.id)"
            [class.bg-blue-50]="isSelected(cat.id)"
          >
            <input
              type="checkbox"
              [checked]="isSelected(cat.id)"
              (change)="toggleCategory(cat.id)"
              class="w-4 h-4 text-blue-600 rounded focus:ring-blue-500"
            />
            <div class="min-w-0 flex-1">
              <p class="break-words font-medium text-slate-700">{{ cat.name }}</p>
              <p class="text-xs text-slate-400">{{ cat.code }}</p>
            </div>
            @if (isSelected(cat.id) && ratings()[cat.id]) {
              <div class="flex shrink-0 items-center gap-0.5">
                @for (star of [1, 2, 3, 4, 5]; track star) {
                  <button
                    (click)="setRating(cat.id, star)"
                    class="text-lg leading-none focus:outline-none"
                    [class.text-yellow-400]="star <= ratings()[cat.id]"
                    [class.text-slate-300]="star > ratings()[cat.id]"
                  >
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                      <path
                        d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"
                      />
                    </svg>
                  </button>
                }
              </div>
            }
          </label>
        }
      </div>
    </div>

    <!-- Notification Settings -->
    <div class="mb-4 rounded-2xl border border-slate-200 bg-white p-4 shadow-sm sm:mb-6 sm:p-6">
      <h2 class="mb-4 text-lg font-semibold text-slate-800">Cài đặt thông báo</h2>
      <div class="space-y-4">
        <label class="flex cursor-pointer items-start justify-between gap-4">
          <div class="min-w-0">
            <p class="font-medium text-slate-700">Thông báo qua email</p>
            <p class="text-sm text-slate-500">Nhận thông báo qua email.</p>
          </div>
          <input
            type="checkbox"
            [checked]="notifSettings()?.emailEnabled"
            (change)="updateNotif('emailEnabled', $event)"
            class="w-5 h-5 text-blue-600 rounded focus:ring-blue-500"
          />
        </label>
        <label class="flex cursor-pointer items-start justify-between gap-4">
          <div class="min-w-0">
            <p class="font-medium text-slate-700">Push notification</p>
            <p class="text-sm text-slate-500">Nhận thông báo trực tiếp trên trình duyệt.</p>
          </div>
          <input
            type="checkbox"
            [checked]="notifSettings()?.pushEnabled"
            (change)="updateNotif('pushEnabled', $event)"
            class="w-5 h-5 text-blue-600 rounded focus:ring-blue-500"
          />
        </label>
        <label class="flex cursor-pointer items-start justify-between gap-4">
          <div class="min-w-0">
            <p class="font-medium text-slate-700">Nhắc nhở hoạt động</p>
            <p class="text-sm text-slate-500">Nhận thông báo trước khi hoạt động bắt đầu.</p>
          </div>
          <input
            type="checkbox"
            [checked]="notifSettings()?.activityReminder"
            (change)="updateNotif('activityReminder', $event)"
            class="w-5 h-5 text-blue-600 rounded focus:ring-blue-500"
          />
        </label>
        <label class="flex cursor-pointer items-start justify-between gap-4">
          <div class="min-w-0">
            <p class="font-medium text-slate-700">Xác nhận đăng ký</p>
            <p class="text-sm text-slate-500">Nhận thông báo khi đăng ký thành công.</p>
          </div>
          <input
            type="checkbox"
            [checked]="notifSettings()?.registrationConfirmation"
            (change)="updateNotif('registrationConfirmation', $event)"
            class="w-5 h-5 text-blue-600 rounded focus:ring-blue-500"
          />
        </label>
      </div>
    </div>

    <!-- Actions -->
    <div class="flex flex-col-reverse gap-3 sm:flex-row sm:items-center sm:justify-between">
      <button
        (click)="resetToDefault()"
        [disabled]="isSaving()"
        class="min-h-11 rounded-xl px-4 py-2 text-sm font-semibold text-slate-600 transition hover:bg-slate-100 hover:text-slate-800 disabled:opacity-50"
      >
        Khôi phục mặc định
      </button>
      <button
        (click)="savePreferences()"
        [disabled]="isSaving()"
        class="flex min-h-11 items-center justify-center gap-2 rounded-xl bg-gradient-to-r from-blue-600 to-sky-500 px-6 py-2 text-sm font-semibold text-white transition hover:from-blue-700 hover:to-sky-600 disabled:opacity-50"
      >
        @if (isSaving()) {
          <div
            class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"
          ></div>
          Đang lưu...
        } @else {
          Lưu thay đổi
        }
      </button>
    </div>
  </div>
</div>
