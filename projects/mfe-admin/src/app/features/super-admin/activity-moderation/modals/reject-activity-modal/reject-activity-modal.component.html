<div class="fixed inset-0 z-[100] flex items-center justify-center p-4 sm:p-6" style="z-index: 9999;">
  <div
    class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity"
    role="button"
    tabindex="0"
    aria-label="Đóng hộp thoại"
    (click)="onCancel()"
    (keydown.enter)="onCancel()">
  </div>

  <div class="relative bg-white rounded-[2rem] shadow-2xl w-full max-w-lg overflow-hidden animate-fade-in-up">
    <div class="px-6 py-5 border-b border-slate-100 flex justify-between items-center bg-rose-50/30">
      <div>
        <h3 class="text-xl font-black text-slate-800 tracking-tight">Từ chối hoạt động</h3>
        <p class="text-xs font-bold text-slate-500 mt-1 line-clamp-1">
          Hoạt động: <span class="text-rose-600">{{ activityName() }}</span>
        </p>
      </div>
      <button
        (click)="onCancel()"
        class="w-8 h-8 flex items-center justify-center rounded-full bg-slate-100 hover:bg-rose-100 text-slate-500 hover:text-rose-500 transition-colors">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <div class="p-6">
      <label for="reason" class="block text-sm font-bold text-slate-700 mb-2">
        Lý do từ chối <span class="text-red-500">*</span>
      </label>
      <textarea
        id="reason"
        [(ngModel)]="rejectReason"
        rows="4"
        placeholder="Nhập lý do chi tiết (VD: Thiếu minh chứng, nội dung chưa phù hợp...)"
        class="w-full px-4 py-3 rounded-2xl border-2 border-slate-200 focus:border-rose-400 focus:ring-4 focus:ring-rose-50 transition-all resize-none text-sm font-medium text-slate-700 placeholder:font-normal"
      ></textarea>
      <p class="text-[11px] text-slate-400 mt-2 font-medium">
        * Lý do này sẽ được gửi trực tiếp đến đơn vị tổ chức để họ chỉnh sửa.
      </p>
    </div>

    <div class="px-6 py-4 border-t border-slate-100 bg-slate-50 flex gap-3 justify-end">
      <button
        (click)="onCancel()"
        class="px-5 py-2.5 rounded-xl font-bold text-slate-600 hover:bg-slate-200 transition-colors text-sm">
        Hủy bỏ
      </button>
      <button
        (click)="onConfirm()"
        [disabled]="!rejectReason().trim()"
        class="px-6 py-2.5 rounded-xl font-bold text-white bg-rose-600 hover:bg-rose-700 disabled:opacity-50 disabled:cursor-not-allowed transition-all shadow-md shadow-rose-200 flex items-center gap-2 text-sm">
        <i class="bi bi-send-fill"></i> Xác nhận từ chối
      </button>
    </div>
  </div>
</div>
