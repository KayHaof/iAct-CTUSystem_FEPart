<div class="fixed inset-0 z-[100] flex items-center justify-center p-4 sm:p-6" style="z-index: 9999;">
  <div
    class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity"
    role="button"
    tabindex="0"
    aria-label="Đóng chi tiết lý do"
    (click)="onClose()"
    (keydown.enter)="onClose()">
  </div>

  <div class="relative bg-white rounded-[2rem] shadow-2xl w-full max-w-md overflow-hidden animate-fade-in-up">

    <div class="px-6 py-5 border-b border-slate-100 flex justify-between items-center bg-slate-50">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-rose-100 flex items-center justify-center text-rose-500 text-lg shrink-0">
          <i class="bi bi-info-circle-fill"></i>
        </div>
        <div>
          <h3 class="text-lg font-black text-slate-800 tracking-tight">Chi tiết lý do</h3>
          <p class="text-xs font-bold text-slate-500 mt-0.5 line-clamp-1">
            {{ activityName() }}
          </p>
        </div>
      </div>
    </div>

    <div class="p-6">
      <div class="bg-slate-50 border border-slate-200 p-4 rounded-2xl text-sm font-medium text-slate-700 leading-relaxed whitespace-pre-wrap">
        {{ reason() }}
      </div>
    </div>

    <div class="px-6 py-4 border-t border-slate-100 bg-white flex justify-end">
      <button
        (click)="onClose()"
        class="px-6 py-2.5 rounded-xl font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 transition-colors text-sm">
        Đóng lại
      </button>
    </div>
  </div>
</div>
