@if (isOpen) {
  <div class="modal-overlay">
    <div class="modal-backdrop" role="button" tabindex="0" aria-label="Đóng" (click)="close()" (keydown.enter)="close()"></div>
    <div class="modal-content">
      <header class="modal-header">
        <div class="modal-header-info">
          <h2 class="modal-title">Phân lớp sinh viên</h2>
          <p class="modal-subtitle">
            {{ user?.studentCode || user?.username }} - {{ user?.fullName || 'Chưa cập nhật' }}
          </p>
        </div>
        <button type="button" (click)="close()" class="icon-btn" title="Đóng">
          <i class="bi bi-x-lg"></i>
        </button>
      </header>

      <div class="modal-body">
        <div class="form-group">
          <label for="editDeptSelect" class="input-label">Trường / khoa</label>
          <select id="editDeptSelect" [(ngModel)]="editSelectedDept" (change)="onEditDeptChange()" class="input-field select-field">
            <option value="">Chọn trường / khoa</option>
            @for (dept of departments || []; track dept.id) {
              <option [value]="dept.id">{{ dept.name }}</option>
            }
          </select>
        </div>

        <div class="form-group">
          <label for="editMajorSelect" class="input-label" [class.input-label-disabled]="!editSelectedDept()">Chuyên ngành</label>
          <select id="editMajorSelect" [(ngModel)]="editSelectedMajor" (change)="onEditMajorChange()" [disabled]="!editSelectedDept()" class="input-field select-field">
            <option value="">Chọn chuyên ngành</option>
            @for (major of majors() || []; track major.id) {
              <option [value]="major.id">{{ major.name }}</option>
            }
          </select>
        </div>

        <div class="form-group">
          <label for="editClassSelect" class="input-label" [class.input-label-disabled]="!editSelectedMajor()">Lớp sinh hoạt</label>
          <select id="editClassSelect" [(ngModel)]="editSelectedClass" [disabled]="!editSelectedMajor()" class="input-field select-field input-field-emerald">
            <option value="">Chọn lớp sinh hoạt</option>
            @for (cls of classesForEdit() || []; track cls.id) {
              <option [value]="cls.id">{{ cls.classCode || cls.name }}</option>
            }
          </select>
        </div>
      </div>

      <footer class="modal-footer">
        <button type="button" (click)="close()" class="btn-secondary">Hủy bỏ</button>
        <button type="button" (click)="submit()" [disabled]="!editSelectedClass() || isSaving" class="btn-primary">
          @if (isSaving) {
            <i class="bi bi-arrow-repeat spin-icon"></i>
            Đang lưu
          } @else {
            <i class="bi bi-check-circle-fill"></i>
            Lưu thay đổi
          }
        </button>
      </footer>
    </div>
  </div>
}
