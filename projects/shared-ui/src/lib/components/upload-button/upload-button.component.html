<div class="upload-container">
  <input
    type="file"
    id="fileInput"
    (change)="onFileSelected($event)"
    accept="image/*"
    [disabled]="isLoading"
    style="display: none"
  />

  <label for="fileInput" class="upload-btn" [class.disabled]="isLoading">
    @if (isLoading) {
      <span>Đang tải lên...</span>
    } @else {
      <span>{{ label }}</span>
    }
  </label>

  @if (errorMessage) {
    <p class="error-text">{{ errorMessage }}</p>
  }
</div>
