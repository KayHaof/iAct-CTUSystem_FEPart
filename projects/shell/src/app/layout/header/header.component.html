<header class="header-wrapper">
  <button class="md:hidden mr-4 text-2xl text-gray-600 focus:outline-none" (click)="toggleMenu()">
    <i class="bi bi-list"></i>
  </button>
  <div class="search-bar">
    <i class="bi bi-search search-icon"></i>
    <input type="text" placeholder="Tìm kiếm hoạt động, tin tức..." class="search-input" />
  </div>

  <div
    class="user-profile group flex items-center gap-3 cursor-pointer hover:bg-gray-100 p-2 rounded-lg transition-all"
    (click)="navigateToProfile()"
  >
    <div class="user-info hidden md:flex flex-col text-right">
      <span class="name font-bold text-sm text-gray-800">
        {{ userService.currentUser()?.fullName || 'Sinh viên' }}
      </span>
      <span class="role text-xs text-gray-500">Công nghệ thông tin</span>
    </div>

    <img
      [src]="userService.currentUser()?.avtUrl || defaultAvatar"
      alt="Avatar"
      class="avatar-img w-10 h-10 rounded-full object-cover border-2 border-transparent group-hover:border-blue-500 transition-all"
    />
  </div>
</header>
