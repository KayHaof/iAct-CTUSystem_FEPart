<aside>
  <div class="logo">iAct CTU</div>

  <nav>
    @for (item of filteredMenuItems(); track item.label) {
      <a
        [routerLink]="item.link"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: false }"
      >
        <i [class]="item.icon"></i>
        {{ item.label }}
      </a>
    }
  </nav>

  <div class="logout-btn" (click)="logout()"><i class="bi bi-box-arrow-left"></i> Log Out</div>
</aside>
