<main class="error-page" aria-labelledby="server-error-title">
  <div class="error-watermark" aria-hidden="true">500</div>
  <section class="content-card">
    <div class="status-icon status-icon-error" aria-hidden="true">
      <i class="bi bi-hdd-network-fill"></i>
    </div>
    <p class="eyebrow">Lỗi hệ thống</p>
    <h1 id="server-error-title" class="title">Máy chủ đang gặp sự cố</h1>
    <p class="description">
      Hệ thống chưa thể xử lý yêu cầu của bạn lúc này. Vui lòng thử lại sau hoặc trở về Dashboard để
      tiếp tục.
    </p>
    <a [routerLink]="dashboardUrl()" class="btn-primary"
      ><i class="bi bi-speedometer2" aria-hidden="true"></i>Về Dashboard</a
    >
  </section>
</main>
