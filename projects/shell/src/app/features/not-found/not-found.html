<main class="error-page" aria-labelledby="not-found-title">
  <div class="error-watermark" aria-hidden="true">404</div>
  <section class="content-card">
    <div class="status-icon status-icon-info" aria-hidden="true">
      <i class="bi bi-signpost-split-fill"></i>
    </div>
    <p class="eyebrow">Không tìm thấy trang</p>
    <h1 id="not-found-title" class="title">Đường dẫn không tồn tại</h1>
    <p class="description">
      Trang bạn đang tìm có thể đã được di chuyển, xóa hoặc đường dẫn chưa chính xác.
    </p>
    <div class="action-buttons">
      <a [routerLink]="dashboardUrl()" class="btn-primary"
        ><i class="bi bi-speedometer2" aria-hidden="true"></i>Về Dashboard</a
      >
      <button type="button" (click)="goBack()" class="btn-secondary">
        <i class="bi bi-arrow-left" aria-hidden="true"></i>Quay lại
      </button>
    </div>
  </section>
</main>
